<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riksdags-Memory Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .card-flip { perspective: 1000px; }
        .card-inner { 
            transition: transform 0.6s; 
            transform-style: preserve-3d; 
            position: relative;
            width: 100%; height: 100%;
        }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border-radius: 0.75rem;
        }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<div id="app" class="max-w-5xl mx-auto px-4 py-8">
    <header class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-slate-800 mb-2">Riksdags-Memory</h1>
        <p class="text-slate-500">Träna ansikten på Sveriges makthavare</p>
    </header>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Antal par</label>
                <select v-model="settings.pairs" class="w-full bg-slate-100 border-none rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500">
                    <option :value="4">4 par (Enkelt)</option>
                    <option :value="8">8 par (Normal)</option>
                    <option :value="12">12 par (Svårt)</option>
                    <option :value="18">18 par (Expert)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Filtrera på</label>
                <select v-model="settings.filterType" class="w-full bg-slate-100 border-none rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500">
                    <option value="parti">Parti</option>
                    <option value="org">Utskott</option>
                    <option value="valkrets">Valkrets</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Värde</label>
                <input v-model="settings.filterValue" placeholder="T.ex. S, FiU eller Skåne..." 
                       class="w-full bg-slate-100 border-none rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex items-end">
                <button @click="loadGame" :disabled="loading"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg transition-all disabled:opacity-50">
                    {{ loading ? 'Laddar...' : 'Starta nytt spel' }}
                </button>
            </div>
        </div>
    </div>

    <div v-if="message" class="text-center mb-6 py-2 px-4 bg-blue-50 text-blue-700 rounded-full inline-block mx-auto w-full max-w-sm font-medium">
        {{ message }}
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
        <div v-for="(card, index) in cards" :key="index" 
             @click="flipCard(card)"
             class="card-flip h-52 cursor-pointer group">
            <div class="card-inner shadow-md" :class="{ 'is-flipped': card.isFlipped || card.isMatched }">
                <div class="card-front bg-blue-800 flex items-center justify-center text-blue-200 text-3xl font-bold border-4 border-white">
                    ?
                </div>
                <div class="card-back bg-white p-2 border border-slate-200 flex flex-col items-center">
                    <img :src="card.person.bild_url_192" class="w-full h-32 object-cover rounded-md mb-2 bg-slate-100">
                    <div class="text-center overflow-hidden w-full">
                        <p class="text-xs font-bold truncate">{{ card.person.tilltalsnamn }} {{ card.person.efternamn }}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-tighter">{{ card.person.parti }} | {{ card.person.valkrets }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            loading: false,
            message: 'Välj inställningar och klicka på Starta!',
            cards: [],
            flippedCards: [],
            settings: {
                pairs: 8,
                filterType: 'parti',
                filterValue: 'S'
            }
        }
    },
    methods: {
        async loadGame() {
            this.loading = true;
            this.message = 'Hämtar data från Riksdagen...';
            this.cards = [];
            
            try {
                const url = `https://data.riksdagen.se/personlista/?utformat=json&${this.settings.filterType}=${encodeURIComponent(this.settings.filterValue)}&rdlstatus=tjanst`;
                const response = await fetch(url);
                const data = await response.json();
                
                let ledamoter = data.personlista.person.filter(p => p.bild_url_192);
                
                // Blanda och välj par
                const selection = ledamoter.sort(() => 0.5 - Math.random()).slice(0, this.settings.pairs);
                
                // Skapa kort-objekt
                let gameSet = [...selection, ...selection].map((person, index) => ({
                    id: index,
                    personId: person.intressent_id,
                    person: person,
                    isFlipped: false,
                    isMatched: false
                }));

                this.cards = gameSet.sort(() => 0.5 - Math.random());
                this.message = `Hitta de ${this.settings.pairs} paren!`;
            } catch (error) {
                this.message = 'Kunde inte ladda data. Kontrollera filtret.';
            } finally {
                this.loading = false;
            }
        },

        flipCard(card) {
            if (this.flippedCards.length === 2 || card.isFlipped || card.isMatched) return;

            card.isFlipped = true;
            this.flippedCards.push(card);

            if (this.flippedCards.length === 2) {
                this.checkMatch();
            }
        },

        checkMatch() {
            const [c1, c2] = this.flippedCards;
            if (c1.personId === c2.personId) {
                c1.isMatched = true;
                c2.isMatched = true;
                this.flippedCards = [];
                this.checkWin();
            } else {
                setTimeout(() => {
                    c1.isFlipped = false;
                    c2.isFlipped = false;
                    this.flippedCards = [];
                }, 1000);
            }
        },

        checkWin() {
            if (this.cards.every(c => c.isMatched)) {
                this.message = "Snyggt! Du vann! 🏆";
            }
        }
    }
}).mount('#app');
</script>

</body>
</html>
