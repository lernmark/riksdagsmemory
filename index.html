<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RD-Memory</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        .card-flip { perspective: 1000px; width: 100%; }
        .card-inner { transition: transform 0.5s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 0.3rem; }
        .card-back { transform: rotateY(180deg); background: #fff; }
        
        .game-container { display: flex; flex-direction: column; height: 100dvh; }
        .game-grid { display: grid; gap: 0.3rem; width: 100%; margin: auto; align-content: center; }

        /* OPTIMERADE BILDER: object-contain för att inte kapa huvuden */
        .card-back img { 
            width: 100%; 
            height: 65%; 
            object-fit: contain; 
            background: #f8fafc; /* Ljusgrå bakgrund om bilden inte täcker allt */
            border-bottom: 1px solid #e2e8f0;
        }

        .cards-4-rows { height: calc(75dvh / 4); }
        .cards-6-rows { height: calc(75dvh / 6); }
        .cards-8-rows { height: calc(75dvh / 8); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen overflow-hidden select-none">
    <div id="app" class="game-container px-2 py-2">
        </div>

    <script>
        // Registrera Service Worker för PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW fail', err));
            });
        }
    </script>
</body>
</html>
