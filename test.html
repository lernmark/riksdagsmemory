<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>CORS-test mot Riksdagen</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #status { padding: 15px; margin-top: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        pre { background: #eee; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>

    <h1>CORS-test: Riksdagens API</h1>
    <p>Detta test försöker hämta 5 ledamöter direkt från Riksdagens öppna data.</p>
    
    <button id="testBtn">Testa anslutning</button>

    <div id="status" style="display:none;"></div>
    <div id="resultat" style="display:none;">
        <h3>Data mottagen:</h3>
        <pre id="jsonOutput"></pre>
    </div>

    <script>
        document.getElementById('testBtn').addEventListener('click', async () => {
            const statusDiv = document.getElementById('status');
            const resultatDiv = document.getElementById('resultat');
            const output = document.getElementById('jsonOutput');

            statusDiv.style.display = 'block';
            statusDiv.className = '';
            statusDiv.innerHTML = 'Försöker hämta data...';
            resultatDiv.style.display = 'none';

            // URL till riksdagens personlista (begränsad till 5 personer för snabbhet)
            const url = "https://data.riksdagen.se/personlista/?utformat=json&n=5";

            try {
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP-fel! Status: ${response.status}`);
                }

                const data = await response.json();
                
                // Om vi når hit har det lyckats!
                statusDiv.className = 'success';
                statusDiv.innerHTML = '<strong>Succé!</strong> Webbläsaren tillåter anrop direkt till Riksdagens API.';
                
                resultatDiv.style.display = 'block';
                output.textContent = JSON.stringify(data.personlista.person[0], null, 2);
                
            } catch (error) {
                // Om det är ett CORS-fel hamnar vi oftast här
                statusDiv.className = 'error';
                statusDiv.innerHTML = '<strong>CORS-fel eller nätverksfel!</strong><br>' + 
                                      'Webbläsaren blockerade anropet. Felmeddelande: ' + error.message + 
                                      '<br><br><em>Tips: Om du kör filen lokalt (file://) kan webbläsare vara extra stränga. Prova att ladda upp den på GitHub eller ladda ner JSON-filen lokalt.</em>';
                console.error('Error details:', error);
            }
        });
    </script>
</body>
</html>
